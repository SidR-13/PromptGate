services:
  backend:
    build: ./promptgate-backend
    ports:
      - "8000:8000"
    volumes:
      - ./promptgate-backend:/app
    environment:
      - AI_MOCK=${AI_MOCK:-true}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-haiku-4-5}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/promptgate}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promptgate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
